**Feature**: <feature_slug>
**Version**: 1.0
**Status**: Draft
**Date**: <YYYY-MM-DD>
**Refs**: `1-functional/spec.md`

## Architecture Overview
<components, data flow, and integration points>

## Architecture Decision Records

